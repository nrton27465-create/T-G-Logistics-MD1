<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>🚚 Driver App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── HEADER ─── -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-icon">🚚</div>
      <div>
        <div class="header-title">Driver App</div>
        <div class="header-sub">ระบบจัดการงานขนส่ง</div>
      </div>
    </div>
    <button class="btn-refresh" onclick="refreshApp()">↻</button>
  </div>
</header>

<!-- ─── MAIN ─── -->
<main class="main">
  <div id="configAlert" class="alert alert-warning" style="display:none">
    <div class="alert-icon">⚠️</div>
    <div>
      <div style="font-weight:800;margin-bottom:4px;">ยังไม่ได้ตั้งค่า</div>
      <div>กรุณาแก้ค่า SCRIPT_URL ในโค้ด</div>
    </div>
  </div>

  <!-- PAGE 1: งานปัจจุบัน -->
  <div id="pageHome" class="page active">
    <div class="card">
      <div class="card-body">
        <label class="form-label">🔑 รหัสพนักงานขับ</label>
        <input type="text" id="driverCode" class="form-control" placeholder="เช่น DRV001" style="text-transform:uppercase;">
        <div id="driverNameDisplay" style="margin-top:10px;font-size:var(--fs-sm);color:var(--blue-600);font-weight:600;display:none;"></div>
      </div>
      <div class="card-body">
        <button class="btn btn-primary" onclick="loadMyTrips()">📋 โหลดงานของฉัน</button>
      </div>
    </div>
    <div id="listBox"></div>
  </div>

  <!-- PAGE 2: ประวัติงาน -->
  <div id="pageHistory" class="page">
    <div class="section-head"><div class="section-head-title">ประวัติงานทั้งหมด</div></div>
    <div id="historyBox"></div>
  </div>

  <!-- PAGE 3: สรุป -->
  <div id="pageSummary" class="page">
    <div class="section-head"><div class="section-head-title">สรุป</div></div>
    <div id="summaryBox"></div>
  </div>

  <!-- PAGE 4: PM -->
  <div id="pagePM" class="page">
    <div class="section-head"><div class="section-head-title">PM Plan</div></div>
    <div id="pmBox"></div>
  </div>

  <!-- PAGE 5: ACT PLAN -->
  <div id="pageACT" class="page">
    <div class="section-head"><div class="section-head-title">ACT PLAN</div></div>
    <div class="card">
      <div class="card-body">
        <div style="margin-bottom:16px;">
          <label class="form-label">📅 วันที่</label>
          <input type="date" id="actDate" class="form-control">
        </div>
        <div style="margin-bottom:16px;">
          <label class="form-label">🛣️ เลขไมล์</label>
          <input type="number" id="actOdo" class="form-control" placeholder="กม." inputmode="numeric">
        </div>
        <div style="margin-bottom:16px;">
          <label class="form-label">📝 รายการ</label>
          <input list="actItemList" id="actItem" class="form-control" placeholder="พิมพ์หรือเลือก...">
          <datalist id="actItemList"></datalist>
        </div>
        <div style="margin-bottom:16px;">
          <label class="form-label">⚙️ Action</label>
          <input list="actActionList" id="actAction" class="form-control" placeholder="พิมพ์หรือเลือก...">
          <datalist id="actActionList"></datalist>
        </div>
        <div style="margin-bottom:16px;">
          <label class="form-label">📌 เพิ่มเติม (ถ้ามี)</label>
          <input type="text" id="actAdditional" class="form-control" placeholder="ระบุรายละเอียด...">
        </div>
        <div style="margin-bottom:20px;">
          <label class="form-label">💰 ค่าใช้จ่าย (บาท)</label>
          <input type="number" id="actCost" class="form-control" placeholder="0" inputmode="decimal">
        </div>
        <button class="btn btn-primary" onclick="saveACTPlan()">💾 บันทึก ACT Plan</button>
      </div>
    </div>
  </div>

  <!-- PAGE 6: แจ้งซ่อม -->
  <div id="pageRepair" class="page">
    <div class="section-head"><div class="section-head-title">แจ้งซ่อม</div></div>
    <div class="card">
      <div class="card-body">
        <div style="margin-bottom:16px;">
          <label class="form-label">🛣️ เลขไมล์</label>
          <input type="number" id="repairOdo" class="form-control" placeholder="กม." inputmode="numeric">
        </div>
        <div style="margin-bottom:16px;">
          <label class="form-label">🔧 หัวข้อแจ้งซ่อม</label>
          <input list="repairTopicList" id="repairTopic" class="form-control" placeholder="พิมพ์หรือเลือก...">
          <datalist id="repairTopicList"></datalist>
        </div>
        <div style="margin-bottom:16px;">
          <label class="form-label">📝 รายละเอียดเพิ่มเติม</label>
          <input type="text" id="repairDetail" class="form-control" placeholder="ระบุอาการ...">
        </div>
        <div class="file-input-wrap">
          <input type="file" accept="image/*,video/*" class="file-input" id="repairFile" onchange="previewRepairFile()">
          <label for="repairFile" class="file-label">📷 อัพโหลดรูป/วิดีโอ</label>
          <div id="repairPreview" class="file-preview"></div>
        </div>
        <button class="btn btn-primary" onclick="saveRepairReport()">📤 ส่งแจ้งซ่อม</button>
      </div>
    </div>
  </div>
</main>

<!-- ─── BOTTOM NAV (2 ROWS) ─── -->
<nav class="bottom-nav">
  <div class="nav-row">
    <button class="nav-item active" onclick="switchPage('home')">
      <div class="nav-item-icon">🏠</div>
      <div>งานปัจจุบัน</div>
    </button>
    <button class="nav-item" onclick="switchPage('history')">
      <div class="nav-item-icon">📊</div>
      <div>ประวัติงาน</div>
    </button>
    <button class="nav-item" onclick="switchPage('summary')">
      <div class="nav-item-icon">📈</div>
      <div>สรุป</div>
    </button>
  </div>
  <div class="nav-row">
    <button class="nav-item" onclick="switchPage('pm')">
      <div class="nav-item-icon">🔧</div>
      <div>PM</div>
    </button>
    <button class="nav-item" onclick="switchPage('act')">
      <div class="nav-item-icon">⚙️</div>
      <div>ACT PLAN</div>
    </button>
    <button class="nav-item" onclick="switchPage('repair')">
      <div class="nav-item-icon">🚨</div>
      <div>แจ้งซ่อม</div>
    </button>
  </div>
</nav>

<div class="toast-container" id="toastContainer"></div>

<script src="app.js"></script>
</body>
</html>
